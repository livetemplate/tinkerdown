<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
  <style>
    .terminal-bg { fill: #1a1b26; }
    .browser-bg { fill: #ffffff; }
    .title-bar { fill: #2a2b3d; }
    .browser-bar { fill: #f0f0f0; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .keyword { fill: #bb9af7; }
    .string { fill: #9ece6a; }
    .comment { fill: #565f89; }
    .tag { fill: #7aa2f7; }
    .attr { fill: #e0af68; }
    .attr-val { fill: #9ece6a; }
    .text-dim { fill: #a9b1d6; }
    .text-bright { fill: #c0caf5; }
    .prompt { fill: #7dcfff; }
    .success { fill: #9ece6a; }

    /* Looping slide-up animations — 12s cycle */
    /* Pattern: hidden → slide-up at T → hold → fade out → hidden */

    @keyframes su1 {
      0%,4.2%{opacity:0;transform:translateY(12px)}
      6.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su2 {
      0%,6.7%{opacity:0;transform:translateY(12px)}
      9.2%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su3 {
      0%,9.2%{opacity:0;transform:translateY(12px)}
      11.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su4 {
      0%,11.7%{opacity:0;transform:translateY(12px)}
      14.2%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su5 {
      0%,14.2%{opacity:0;transform:translateY(12px)}
      16.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su6 {
      0%,16.7%{opacity:0;transform:translateY(12px)}
      19.2%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su7 {
      0%,19.2%{opacity:0;transform:translateY(12px)}
      21.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su8 {
      0%,21.7%{opacity:0;transform:translateY(12px)}
      24.2%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su9 {
      0%,24.2%{opacity:0;transform:translateY(12px)}
      26.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su10 {
      0%,26.7%{opacity:0;transform:translateY(12px)}
      29.2%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su11 {
      0%,29.2%{opacity:0;transform:translateY(12px)}
      31.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su12 {
      0%,31.7%{opacity:0;transform:translateY(12px)}
      34.2%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su13 {
      0%,34.2%{opacity:0;transform:translateY(12px)}
      36.7%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }
    @keyframes su-serve {
      0%,35%{opacity:0;transform:translateY(12px)}
      37.5%{opacity:1;transform:translateY(0)}
      70.8%{opacity:1;transform:translateY(0)}
      79.2%{opacity:0;transform:translateY(0)}
      100%{opacity:0;transform:translateY(12px)}
    }

    /* Looping fade-in animations */
    @keyframes fi-arrow {
      0%,36.7%{opacity:0}40%{opacity:1}70.8%{opacity:1}79.2%{opacity:0}100%{opacity:0}
    }
    @keyframes fi-b1 {
      0%,40%{opacity:0}45%{opacity:1}70.8%{opacity:1}79.2%{opacity:0}100%{opacity:0}
    }
    @keyframes fi-b2 {
      0%,45%{opacity:0}49.2%{opacity:1}70.8%{opacity:1}79.2%{opacity:0}100%{opacity:0}
    }
    @keyframes fi-b3 {
      0%,50%{opacity:0}54.2%{opacity:1}70.8%{opacity:1}79.2%{opacity:0}100%{opacity:0}
    }

    .line { opacity: 0; }
    .line1 { animation: su1 12s ease infinite; }
    .line2 { animation: su2 12s ease infinite; }
    .line3 { animation: su3 12s ease infinite; }
    .line4 { animation: su4 12s ease infinite; }
    .line5 { animation: su5 12s ease infinite; }
    .line6 { animation: su6 12s ease infinite; }
    .line7 { animation: su7 12s ease infinite; }
    .line8 { animation: su8 12s ease infinite; }
    .line9 { animation: su9 12s ease infinite; }
    .line10 { animation: su10 12s ease infinite; }
    .line11 { animation: su11 12s ease infinite; }
    .line12 { animation: su12 12s ease infinite; }
    .line13 { animation: su13 12s ease infinite; }
    .serve-line { animation: su-serve 12s ease infinite; opacity: 0; }
    .arrow-anim { animation: fi-arrow 12s ease infinite; opacity: 0; }
    .browser-content { opacity: 0; }
    .browser-step1 { animation: fi-b1 12s ease infinite; }
    .browser-step2 { animation: fi-b2 12s ease infinite; }
    .browser-step3 { animation: fi-b3 12s ease infinite; }
  </style>

  <defs>
    <clipPath id="terminal-clip"><rect x="16" y="44" width="440" height="480" rx="10"/></clipPath>
    <clipPath id="browser-clip"><rect x="504" y="44" width="440" height="480" rx="10"/></clipPath>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" rx="12" fill="#0f0f14"/>

  <!-- Terminal Window -->
  <g>
    <rect x="16" y="8" width="440" height="520" rx="10" class="terminal-bg" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="16" y="8" width="440" height="36" rx="10" class="title-bar"/>
    <rect x="16" y="34" width="440" height="10" class="title-bar"/>
    <circle cx="36" cy="26" r="6" class="dot-red"/>
    <circle cx="56" cy="26" r="6" class="dot-yellow"/>
    <circle cx="76" cy="26" r="6" class="dot-green"/>
    <text x="236" y="30" text-anchor="middle" fill="#565f89" font-size="12">index.md</text>

    <g clip-path="url(#terminal-clip)">
      <!-- Markdown content typing in -->
      <text y="68" x="28" class="line line1 comment">---</text>

      <g class="line line2">
        <text y="86" x="28" class="keyword">title</text><text y="86" x="60" class="text-dim">: </text><text y="86" x="72" class="string">"Task Manager"</text>
      </g>

      <g class="line line3">
        <text y="104" x="28" class="keyword">sources</text><text y="104" x="84" class="text-dim">:</text>
      </g>

      <g class="line line4">
        <text y="122" x="44" class="keyword">tasks</text><text y="122" x="84" class="text-dim">:</text>
      </g>

      <g class="line line5">
        <text y="140" x="60" class="attr">type</text><text y="140" x="92" class="text-dim">: </text><text y="140" x="104" class="string">sqlite</text>
      </g>

      <g class="line line6">
        <text y="158" x="60" class="attr">path</text><text y="158" x="92" class="text-dim">: </text><text y="158" x="104" class="string">./tasks.db</text>
      </g>

      <g class="line line7">
        <text y="176" x="60" class="attr">query</text><text y="176" x="100" class="text-dim">: </text><text y="176" x="112" class="string">SELECT * FROM tasks</text>
      </g>

      <text y="194" x="28" class="line line8 comment">---</text>

      <g class="line line9">
        <text y="218" x="28" class="text-bright"># My Tasks</text>
      </g>

      <g class="line line10">
        <text y="242" x="28" class="tag">&lt;table</text>
        <text y="242" x="80" class="attr"> lvt-source</text><text y="242" x="168" class="text-dim">=</text><text y="242" x="176" class="attr-val">"tasks"</text>
      </g>

      <g class="line line11">
        <text y="260" x="52" class="attr">lvt-columns</text><text y="260" x="148" class="text-dim">=</text><text y="260" x="156" class="attr-val">"title,status"</text>
      </g>

      <g class="line line12">
        <text y="278" x="52" class="attr">lvt-actions</text><text y="278" x="148" class="text-dim">=</text><text y="278" x="156" class="attr-val">"Done,Delete"</text><text y="278" x="252" class="tag">&gt;</text>
      </g>

      <g class="line line13">
        <text y="296" x="28" class="tag">&lt;/table&gt;</text>
      </g>

      <!-- Serve command -->
      <g class="serve-line">
        <text y="340" x="28" class="prompt">$</text>
        <text y="340" x="44" class="text-bright"> tinkerdown serve</text>
        <text y="358" x="28" class="success">Server running at localhost:8080</text>
      </g>
    </g>
  </g>

  <!-- Arrow -->
  <g class="arrow-anim">
    <line x1="462" y1="270" x2="496" y2="270" stroke="url(#arrow-grad)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="496,264 508,270 496,276" fill="#bb9af7"/>
  </g>

  <!-- Browser Window -->
  <g>
    <rect x="504" y="8" width="440" height="520" rx="10" class="browser-bg" stroke="#ddd" stroke-width="1"/>
    <rect x="504" y="8" width="440" height="36" rx="10" class="browser-bar"/>
    <rect x="504" y="34" width="440" height="10" class="browser-bar"/>
    <circle cx="524" cy="26" r="6" class="dot-red"/>
    <circle cx="544" cy="26" r="6" class="dot-yellow"/>
    <circle cx="564" cy="26" r="6" class="dot-green"/>
    <rect x="600" y="18" width="290" height="16" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="650" y="30" fill="#999" font-size="10" font-family="system-ui, sans-serif">localhost:8080</text>

    <g clip-path="url(#browser-clip)">
      <!-- App title -->
      <g class="browser-content browser-step1">
        <text x="536" y="80" fill="#1a1b26" font-size="22" font-weight="bold" font-family="system-ui, sans-serif">My Tasks</text>
      </g>

      <!-- Table header -->
      <g class="browser-content browser-step2">
        <rect x="536" y="96" width="380" height="32" rx="4" fill="#f8f9fa"/>
        <text x="552" y="117" fill="#444" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">Title</text>
        <text x="720" y="117" fill="#444" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">Status</text>
        <text x="850" y="117" fill="#444" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">Actions</text>
      </g>

      <!-- Table rows -->
      <g class="browser-content browser-step3">
        <line x1="536" y1="128" x2="916" y2="128" stroke="#eee" stroke-width="1"/>
        <text x="552" y="150" fill="#333" font-size="12" font-family="system-ui, sans-serif">Build landing page</text>
        <text x="720" y="150" fill="#666" font-size="12" font-family="system-ui, sans-serif">In Progress</text>
        <rect x="836" y="137" width="36" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
        <text x="839" y="151" fill="#333" font-size="9" font-family="system-ui, sans-serif">Done</text>
        <rect x="876" y="137" width="36" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
        <text x="880" y="151" fill="#333" font-size="9" font-family="system-ui, sans-serif">Del</text>

        <line x1="536" y1="164" x2="916" y2="164" stroke="#eee" stroke-width="1"/>
        <text x="552" y="184" fill="#333" font-size="12" font-family="system-ui, sans-serif">Write API docs</text>
        <text x="720" y="184" fill="#666" font-size="12" font-family="system-ui, sans-serif">Done</text>
        <rect x="836" y="171" width="36" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
        <text x="839" y="185" fill="#333" font-size="9" font-family="system-ui, sans-serif">Done</text>
        <rect x="876" y="171" width="36" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
        <text x="880" y="185" fill="#333" font-size="9" font-family="system-ui, sans-serif">Del</text>

        <line x1="536" y1="198" x2="916" y2="198" stroke="#eee" stroke-width="1"/>
        <text x="552" y="218" fill="#333" font-size="12" font-family="system-ui, sans-serif">Fix auth bug</text>
        <text x="720" y="218" fill="#666" font-size="12" font-family="system-ui, sans-serif">New</text>
        <rect x="836" y="205" width="36" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
        <text x="839" y="219" fill="#333" font-size="9" font-family="system-ui, sans-serif">Done</text>
        <rect x="876" y="205" width="36" height="20" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
        <text x="880" y="219" fill="#333" font-size="9" font-family="system-ui, sans-serif">Del</text>

        <line x1="536" y1="232" x2="916" y2="232" stroke="#eee" stroke-width="1"/>
      </g>
    </g>
  </g>

  <!-- Bottom label -->
  <text x="480" y="534" text-anchor="middle" fill="#565f89" font-size="11" font-family="system-ui, sans-serif">
    Write markdown  &#8594;  Get an interactive app  &#8594;  Data persists to SQLite
  </text>
</svg>
